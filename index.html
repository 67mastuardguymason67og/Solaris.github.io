<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Awesome Site</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            text-align: center;
            padding: 40px;
            border: 1px solid #333;
            border-radius: 15px;
            background: #1e1e1e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #00ff88; }
        p { color: #aaa; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome to My Site</h1>
        <p>This is hosted for $0 on GitHub Pages.</p>
        <p>No ads. No fees. Just code.</p>
    </div>
</body>
</html>
