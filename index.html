<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLARIS | Hub</title>
    <style>
        :root {
            --solaris-yellow: #ffff00;
            --bg-dark: #0d0d12;
            --sidebar-bg: #15151e;
            --card-bg: #1a1a24;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Impact', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 80px;
            background-color: var(--sidebar-bg);
            border-right: 2px solid var(--solaris-yellow);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            gap: 30px;
            flex-shrink: 0;
        }

        .nav-icon {
            font-size: 1.5rem;
            color: #666;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-icon:hover, .nav-icon.active {
            color: var(--solaris-yellow);
            text-shadow: 0 0 10px var(--solaris-yellow);
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header-logo {
            background-color: var(--solaris-yellow);
            color: black;
            display: inline-block;
            padding: 10px 40px;
            font-size: 3rem;
            border: 4px solid black;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.4);
        }

        .search-box {
            width: 100%;
            max-width: 600px;
            background: #222;
            border: 2px solid #333;
            padding: 15px;
            color: white;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 5px;
            margin-bottom: 40px;
            outline: none;
            display: block;
        }

        .search-box:focus {
            border-color: var(--solaris-yellow);
        }

        /* --- GAME GRID --- */
        .grid-title {
            font-size: 2rem;
            margin-bottom: 20px;
            border-left: 5px solid var(--solaris-yellow);
            padding-left: 15px;
            text-transform: uppercase;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 10px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            text-align: center;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--solaris-yellow);
            box-shadow: 0 5px 15px rgba(255, 255, 0, 0.2);
        }

        .thumb {
            height: 120px;
            background: #252530;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }

        .title {
            padding: 10px;
            font-size: 1.1rem;
            background: #222;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-icon active">🏠</div>
        <div class="nav-icon">🎮</div>
        <div class="nav-icon">⭐</div>
        <div class="nav-icon">⚙️</div>
    </div>

    <div class="main-content">
        <div class="header-logo">SOLARIS</div>
        
        <input type="text" id="googleSearch" class="search-box" placeholder="TYPE TO SEARCH GOOGLE...">

        <div class="grid-title">GAMES</div>

        <div class="game-grid">
            <a href="#" class="game-card"><div class="thumb">🐍</div><div class="title">SNAKE</div></a>
            <a href="#" class="game-card"><div class="thumb">🏎️</div><div class="title">DRIFT</div></a>
            <a href="#" class="game-card"><div class="thumb">📦</div><div class="title">BLOCKS</div></a>
            <a href="#" class="game-card"><div class="thumb">🔫</div><div class="title">EV.IO</div></a>
            <a href="#" class="game-card"><div class="thumb">🏀</div><div class="title">HOOPS</div></a>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('googleSearch');
        searchInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const query = searchInput.value;
                if (query) {
                    window.open('https://www.google.com/search?q=' + encodeURIComponent(query), '_blank');
                }
            }
        });
    </script>

</body>
</html>
