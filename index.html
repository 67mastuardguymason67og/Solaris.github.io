<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOLARIS HUB</title>
    <style>
        :root {
            --solaris-yellow: #ffff00;
            --bg-dark: #0d0d12;
            --sidebar-bg: #15151e;
            --card-bg: #1a1a24;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Impact', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 70px;
            background: var(--sidebar-bg);
            border-right: 2px solid var(--solaris-yellow);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            gap: 25px;
            flex-shrink: 0;
        }

        .nav-icon {
            font-size: 1.8rem;
            color: #444;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-icon:hover { color: var(--solaris-yellow); }

        /* Main Content */
        .main {
            flex: 1;
            padding: 25px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .logo {
            background: var(--solaris-yellow);
            color: black;
            padding: 10px 30px;
            font-size: 2.5rem;
            width: fit-content;
            cursor: pointer;
            margin-bottom: 15px;
            border: 4px solid black;
        }

        .search-box {
            width: 100%;
            max-width: 400px;
            background: #222;
            border: 2px solid #333;
            padding: 12px;
            color: white;
            margin-bottom: 20px;
            outline: none;
            font-family: sans-serif;
        }

        .search-box:focus { border-color: var(--solaris-yellow); }

        /* Game Display */
        #display-window {
            display: none;
            flex: 1;
            border: 3px solid var(--solaris-yellow);
            background: #000;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* Grid */
        #game-grid-container { display: block; overflow-y: auto; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover { border-color: var(--solaris-yellow); transform: translateY(-3px); }
        .thumb { height: 100px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; background: #252530; }
        .title { padding: 10px; font-size: 0.9rem; background: #1a1a24; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-icon" onclick="goHome()">🏠</div>
        <div class="nav-icon" onclick="goHome()">🎮</div>
    </div>

    <div class="main">
        <div class="logo" onclick="goHome()">SOLARIS</div>
        
        <input type="text" id="searchInput" class="search-box" placeholder="Search DuckDuckGo...">

        <div id="display-window">
            <iframe id="main-frame" src="" sandbox="allow-scripts allow-popups allow-forms allow-same-origin allow-popups-to-escape-sandbox allow-downloads allow-storage-access-by-user-activation"></iframe>
        </div>

        <div id="game-grid-container">
            <h2 style="border-left: 5px solid #ffff00; padding-left: 10px; text-transform: uppercase;">Library</h2>
            <div class="grid">
                
                <div class="card" onclick="openContent('https://or321.github.io/choppy-orc-autosplitter/')">
                    <div class="thumb">🪓</div>
                    <div class="title">CHOPPY ORC</div>
                </div>

                <div class="card" onclick="openContent('snake.html')">
                    <div class="thumb">🐍</div>
                    <div class="title">SNAKE</div>
                </div>

                <div class="card" onclick="openContent('https://play2048.co/')">
                    <div class="thumb">🔢</div>
                    <div class="title">2048</div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const grid = document.getElementById('game-grid-container');
        const display = document.getElementById('display-window');
        const frame = document.getElementById('main-frame');
        const search = document.getElementById('searchInput');

        function openContent(url) {
            grid.style.display = 'none';
            display.style.display = 'flex';
            frame.src = url;
        }

        function goHome() {
            display.style.display = 'none';
            grid.style.display = 'block';
            frame.src = "";
        }

        search.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                openContent(`https://duckduckgo.com/?q=${encodeURIComponent(search.value)}&kp=-1`);
            }
        });
    </script>
</body>
</html>
