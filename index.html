<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOLARIS HUB</title>
    <style>
        body {
            background-color: #0d0d12;
            color: white;
            font-family: 'Impact', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
        }
        /* Sidebar */
        .sidebar {
            width: 70px;
            background: #15151e;
            border-right: 2px solid #ffff00;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }
        /* Main Area */
        .main {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .logo {
            background: #ffff00;
            color: black;
            padding: 10px 30px;
            font-size: 2rem;
            width: fit-content;
            cursor: pointer;
            margin-bottom: 20px;
        }
        /* The Game Box */
        #content-frame {
            display: none;
            flex: 1;
            border: 3px solid #ffff00;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* Game Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }
        .card {
            background: #1a1a24;
            border: 1px solid #333;
            padding: 20px;
            text-align: center;
            cursor: pointer;
        }
        .card:hover { border-color: #ffff00; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="font-size:2rem; cursor:pointer;" onclick="location.reload()">🏠</div>
    </div>

    <div class="main">
        <div class="logo" onclick="location.reload()">SOLARIS</div>
        
        <div id="content-frame">
            <iframe id="ifr"></iframe>
        </div>

        <div id="game-list">
            <h2>GAMES</h2>
            <div class="grid">
                <div class="card" onclick="openGame('snake.html')">
                    <div style="font-size:2rem">🐍</div>
                    <div>SNAKE</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openGame(url) {
            document.getElementById('game-list').style.display = 'none';
            document.getElementById('content-frame').style.display = 'block';
            document.getElementById('ifr').src = url;
        }
    </script>
</body>
</html>
