<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Private Arcade</title>
    <style>
        /* Modern Dark Theme */
        body {
            background-color: #0f111a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
            margin-bottom: 40px;
        }

        /* The Grid Layout */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* The Game Cards */
        .game-card {
            background: #1c1f2b;
            border: 1px solid #333;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, border-color 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: #00ffcc;
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.2);
        }

        .thumbnail {
            width: 100%;
            height: 150px;
            background: #2a2e3f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .game-info {
            padding: 15px;
            text-align: center;
        }

        .game-title {
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <h1>UNBLOCKED HUB</h1>

    <div class="game-grid">
        
        <a href="#" class="game-card">
            <div class="thumbnail">🐍</div>
            <div class="game-info">
                <div class="game-title">Snake Classic</div>
            </div>
        </a>

        <a href="#" class="game-card">
            <div class="thumbnail">🧱</div>
            <div class="game-info">
                <div class="game-title">Tetris</div>
            </div>
        </a>

        <a href="#" class="game-card">
            <div class="thumbnail">⚽</div>
            <div class="game-info">
                <div class="game-title">World Cup</div>
            </div>
        </a>

        <a href="#" class="game-card">
            <div class="thumbnail">🚀</div>
            <div class="game-info">
                <div class="game-title">Space Invaders</div>
            </div>
        </a>

    </div>

</body>
</html>
