<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLARIS | Hub</title>
    <style>
        :root {
            --solaris-yellow: #ffff00;
            --bg-dark: #0d0d12;
            --sidebar-bg: #15151e;
            --card-bg: #1a1a24;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Impact', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 80px;
            background-color: var(--sidebar-bg);
            border-right: 2px solid var(--solaris-yellow);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            gap: 30px;
            flex-shrink: 0;
        }

        .nav-icon {
            font-size: 1.8rem;
            color: #444;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-icon:hover, .nav-icon.active {
            color: var(--solaris-yellow);
            text-shadow: 0 0 10px var(--solaris-yellow);
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 25px;
            position: relative;
        }

        .header-logo {
            background-color: var(--solaris-yellow);
            color: black;
            display: inline-block;
            padding: 10px 35px;
            font-size: 2.5rem;
            border: 4px solid black;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(255, 255, 0, 0.3);
            cursor: pointer;
            width: fit-content;
        }

        .search-box {
            width: 100%;
            max-width: 500px;
            background: #222;
            border: 2px solid #333;
            padding: 15px;
            color: white;
            font-family: sans-serif;
            font-size: 1rem;
            border-radius: 5px;
            margin-bottom: 25px;
            outline: none;
        }

        .search-box:focus {
            border-color: var(--solaris-yellow);
        }

        /* --- DISPLAY AREA --- */
        #display-container {
            display: none; 
            flex: 1;
            width: 100%;
            height: 100%;
            border: 3px solid var(--solaris-yellow);
            border-radius: 10px;
            background: #000;
            overflow: hidden;
        }
