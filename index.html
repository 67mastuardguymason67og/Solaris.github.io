<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLARIS | Hub</title>
    <style>
        :root {
            --solaris-yellow: #ffff00;
            --bg-dark: #0d0d12;
            --sidebar-bg: #15151e;
            --card-bg: #1a1a24;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Impact', 'Arial Black', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 75px;
            background-color: var(--sidebar-bg);
            border-right: 2px solid var(--solaris-yellow);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 25px;
            gap: 35px;
            flex-shrink: 0;
        }

        .nav-icon {
            font-size: 2rem;
            color: #333;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-icon:hover {
            color: var(--solaris-yellow);
            filter: drop-shadow(0 0 5px var(--solaris-yellow));
        }

        /* --- MAIN AREA --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
            overflow: hidden;
        }

        .header-logo {
            background-color: var(--solaris-yellow);
            color: black;
            display: inline-block;
            padding: 10px 40px;
            font-size: 2.8rem;
            border: 4px solid black;
            margin-bottom: 20px;
            cursor: pointer;
            width: fit-content;
            letter-spacing: 2px;
        }

        .search-bar {
            width: 100%;
            max-width: 450px;
            background: #222;
            border: 2px solid #444;
            padding: 15px;
            color: white;
            border-radius: 5px;
            margin-bottom: 30px;
            font-size: 1rem;
            outline: none;
        }

        .search-bar:focus { border-color: var(--solaris-yellow); }

        #display-window {
            display: none; 
            flex: 1;
            width: 100%;
            height: 100%;
            border: 3px solid var(--solaris-yellow);
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        iframe { width: 100%; height: 100%; border: none; }

        #games-container { display: block; overflow-y: auto; }

        .section-label {
            font-size: 1.5rem;
            border-left: 6px solid var(--solaris-yellow);
            padding-left: 15px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--solaris-yellow);
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .thumb { height: 110px; background: #22222e; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .title { padding: 12px; font-size: 1rem; background: #1a1a24; border-top: 1px solid #333; }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-icon" onclick="goHome()">🏠</div>
        <div class="nav-icon" onclick="goHome()">🎮</div>
        <div class="nav-icon" style="margin-top: auto; padding-bottom: 30px;">⚙️</div>
    </div>

    <div class="main-content">
        <div class="header-logo" onclick="goHome()">SOLARIS</div>
        
        <input type="text" id="searchInput" class="search-bar" placeholder="Enter Search (Popup Mode)...">

        <div id="display-window">
            <iframe id="main-frame" src=""></iframe>
        </div>

        <div id="games-container">
            <div class="section-label">Library</div>
            <div class="grid">
                
                <div class="card" onclick="openContent('tetris.html')">
                    <div class="thumb">🧱</div>
                    <div class="title">TETRIS</div>
                </div>

                <div class="card" onclick="openContent('Minecraft.html')">
                    <div class="thumb">⛏️</div>
                    <div class="title">MINECRAFT</div>
                </div>

                <div class="card" onclick="openContent('snake.html')">
                    <div class="thumb">🐍</div>
                    <div class="title">SNAKE</div>
                </div>

                <div class="card" onclick="openContent('2048.html')">
                    <div class="thumb">🔢</div>
                    <div class="title">2048</div>
                </div>

                <div class="card" onclick="openContent('choppy.html')">
                    <div class="thumb">🪓</div>
                    <div class="title">CHOPPY ORC</div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const gamesContainer = document.getElementById('games-container');
        const displayWindow = document.getElementById('display-window');
        const mainFrame = document.getElementById('main-frame');
        const searchInput = document.getElementById('searchInput');

        function openContent(url) {
            gamesContainer.style.display = 'none';
            displayWindow.style.display = 'flex';
            mainFrame.src = url;
        }

        function goHome() {
            displayWindow.style.display = 'none';
            gamesContainer.style.display = 'block';
            mainFrame.src = "";
            searchInput.value = "";
        }

        searchInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const query = encodeURIComponent(searchInput.value);
                if (query) {
                    window.open(`https://duckduckgo.com/?q=${query}`, 'SolarisSearch', 'width=1000,height=700');
                }
            }
        });
    </script>
</body>
</html>
